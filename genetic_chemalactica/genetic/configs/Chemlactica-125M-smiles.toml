[model]
checkpoint_path = "yerevann/chemlactica-125m"
tokenizer_path = "yerevann/chemlactica-125m"
representation = "smiles"
mol_tags = ["[START_SMILES]", "[END_SMILES]"]
sim_tags = ["[SIMILAR]", "[/SIMILAR]"]
pad_token = "<pad>"
device = "cuda"
dtype = "bf16" # bf16 / fp32
gen_batch_size = 100000 # put a large number if batched generation is not needed

[generation]
max_new_tokens = 500
temperature = 1.0
do_sample = true
repetition_penalty = 1.01
num_return_sequences = 1

[genetic]
pool_size = 30
num_prompts = 100
num_similars = 1
sim_vals = [0.4, 0.9]
temp_schedule = [1.0, 1.0]